<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContractLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <span class="logo-icon">⚖</span>
        <div class="logo-text">
          <span class="logo-main">ContractLens</span>
          <span class="logo-sub">契約書レビュー</span>
        </div>
      </div>
      <button class="settings-btn" id="settingsBtn" title="設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">

      <!-- Input Section -->
      <section class="input-section" id="inputSection">
        <!-- Position Selector -->
        <div class="position-selector">
          <label class="section-label">あなたの立場</label>
          <div class="position-tabs">
            <button class="position-tab active" data-position="委託側">
              <span class="position-icon">📋</span>
              <span>委託側（発注者）</span>
            </button>
            <button class="position-tab" data-position="受託側">
              <span class="position-icon">🔨</span>
              <span>受託側（受注者）</span>
            </button>
          </div>
          <div class="position-tabs" style="margin-top: 6px;">
            <button class="position-tab" data-position="買主">
              <span class="position-icon">💰</span>
              <span>買主</span>
            </button>
            <button class="position-tab" data-position="売主">
              <span class="position-icon">📦</span>
              <span>売主</span>
            </button>
          </div>
        </div>

        <!-- Text Input -->
        <div class="text-input-area">
          <div class="page-fetch-banner">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span id="pageFetchStatus">ページからテキストを取得中...</span>
          </div>

          <!-- PDF Card (PDF検出時のみ表示) -->
          <div class="pdf-card" id="pdfCard" style="display:none;">
            <div class="pdf-icon">📄</div>
            <div class="pdf-info">
              <span class="pdf-label">PDF文書</span>
              <span class="pdf-size" id="pdfSize"></span>
            </div>
            <span class="pdf-badge">Geminiで直接解析</span>
          </div>

          <!-- テキストエリア (通常ページ用) -->
          <textarea
            id="contractText"
            class="contract-textarea"
            placeholder="ページのテキストを自動取得します。手動で貼り付けることもできます..."
            rows="7"
          ></textarea>
          <div class="text-info" id="textInfo">
            <span id="charCount">0文字</span>
            <span id="textStatus"></span>
          </div>
        </div>

        <!-- API Key Warning -->
        <div class="api-warning" id="apiWarning" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          APIキーが設定されていません。
          <button class="link-btn" id="goToSettingsBtn">設定画面へ</button>
        </div>

        <!-- Analyze Button -->
        <button class="analyze-btn" id="analyzeBtn" disabled>
          <span class="btn-icon">🔍</span>
          <span>レビュー開始</span>
        </button>
      </section>

      <!-- Loading Section -->
      <section class="loading-section" id="loadingSection" style="display:none;">
        <div class="loading-animation">
          <div class="loading-scales">
            <div class="scale-left"></div>
            <div class="scale-right"></div>
          </div>
        </div>
        <p class="loading-text">契約書を分析中...</p>
        <p class="loading-sub">AIが4つの視点からレビューしています</p>
      </section>

      <!-- Results Section -->
      <section class="results-section" id="resultsSection" style="display:none;">

        <!-- Score Summary -->
        <div class="score-summary" id="scoreSummary">
          <div class="score-header">
            <div class="score-info">
              <span class="score-label">総合評価</span>
              <span class="score-value" id="overallScore">--</span>
            </div>
            <div class="score-badges" id="scoreBadges"></div>
          </div>
          <div class="score-bar">
            <div class="score-fill" id="scoreFill"></div>
          </div>
          <p class="score-summary-text" id="summaryText"></p>
        </div>

        <!-- Category Results -->
        <div class="categories" id="categoriesContainer"></div>

        <!-- Danger Words -->
        <div class="danger-section" id="dangerSection" style="display:none;">
          <div class="danger-header">
            <span class="danger-title">⚠ 危険ワード検出</span>
            <span class="danger-count" id="dangerCount">0件</span>
          </div>
          <div class="danger-list" id="dangerList"></div>
        </div>

        <!-- Back Button -->
        <button class="back-btn" id="backBtn">
          ← 新しい契約書をレビュー
        </button>
      </section>

    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
